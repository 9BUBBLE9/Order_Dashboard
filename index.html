<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд заказов</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        canvas { max-height: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Динамика заказов</h1>
        <canvas id="ordersChart"></canvas>
        <p id="info" style="margin-top: 20px; color: gray;">Загрузка данных...</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://snqhldpskptpzboohsse.supabase.co';
		const SUPABASE_ANON_KEY = 'sb_publishable_wc3GiuZNeZIu73TjZwQ2vA_Qxk2bx-l';
		const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadChart() {
            const { data: orders, error } = await supabaseClient
                .from('orders')
                .select('created_at, total_summ')
                .order('created_at', { ascending: true });

            if (error) {
                document.getElementById('info').innerText = 'Ошибка загрузки данных: ' + error.message;
                console.error(error);
                return;
            }

            if (!orders || orders.length === 0) {
                document.getElementById('info').innerText = 'Нет данных для отображения';
                return;
            }

            const grouped = {};
            orders.forEach(order => {
                const date = order.created_at.split('T')[0];
                if (!grouped[date]) grouped[date] = 0;
                grouped[date] += order.total_summ || 0;
            });

            const labels = Object.keys(grouped).sort();
            const data = labels.map(label => grouped[label]);

            const ctx = document.getElementById('ordersChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Общая сумма заказов (тенге)',
                        data: data,
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.1,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toLocaleString()} ₸` } }
                    }
                }
            });

            document.getElementById('info').innerHTML = `Загружено ${orders.length} заказов.`;
        }

        loadChart();
    </script>
</body>
</html>
